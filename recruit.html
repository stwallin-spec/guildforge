<style>
:root {
  --bg: #0e0e12; --bg2: #16161d; --bg3: #1e1e28; --bg4: #26263a;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --text: #e8e6e0; --text2: #9896a4; --text3: #5c5a6a;
  --gold: #c8a84b; --gold2: #f0d070;
  --radius: 6px; --radius2: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Exo 2', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.header h1 {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--gold2);
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.header h1 span {
  color: var(--text2);
  font-weight: 400;
  font-size: 13px;
  margin-left: 8px;
  font-family: 'Exo 2', sans-serif;
}
.sync-dot {
  font-size: 12px;
  color: var(--text3);
}
.main { padding: 24px; max-width: 900px; margin: 0 auto; }

.recruit-list { display: flex; flex-direction: column; gap: 8px; }
.recruit-row {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  overflow: hidden;
}
.recruit-bar-wrap { height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; flex: 1; }
.recruit-bar { height: 100%; border-radius: 3px; transition: width .4s; }
.recruit-nums { font-size: 12px; color: var(--text2); white-space: nowrap; }
.need-badge {
  padding: 2px 9px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.need-more { background: rgba(200,60,60,0.15); color: #f08080; border: 1px solid rgba(200,60,60,0.3); }
.need-ok   { background: rgba(80,180,80,0.12); color: #80d080; border: 1px solid rgba(80,180,80,0.25); }
.need-over { background: rgba(200,168,75,0.12); color: var(--gold); border: 1px solid rgba(200,168,75,0.25); }

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text3);
  font-size: 14px;
  gap: 10px;
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .main { padding: 16px; }
  .recruit-row { flex-wrap: wrap; }
}
</style>
</head>

  'Mage:Arcane':BASE+'spell_holy_magicalsentry.jpg','Mage:Fire':BASE+'spell_fire_firebolt02.jpg','Mage:Frost':BASE+'spell_frost_frostbolt02.jpg',
  'Warlock:Affliction':BASE+'spell_shadow_deathcoil.jpg','Warlock:Demonology':BASE+'spell_shadow_metamorphosis.jpg','Warlock:Destruction':BASE+'spell_shadow_rainoffire.jpg',
  'Druid:Balance':BASE+'spell_nature_starfall.jpg','Druid:Feral':BASE+'ability_druid_catform.jpg','Druid:Restoration':BASE+'spell_nature_healingtouch.jpg',
};
const CLASS_SPECS = {
  Warrior:['Arms','Fury','Protection'],Paladin:['Holy','Protection','Retribution'],
  Hunter:['Beast Mastery','Marksmanship','Survival'],Rogue:['Assassination','Combat','Subtlety'],
  Priest:['Discipline','Holy','Shadow'],Shaman:['Elemental','Enhancement','Restoration'],
  Mage:['Arcane','Fire','Frost'],Warlock:['Affliction','Demonology','Destruction'],
  Druid:['Balance','Feral','Restoration'],
};
const CLASS_ICONS = {
  Warrior:BASE+'ability_warrior_savageblow.jpg',Paladin:BASE+'spell_holy_holybolt.jpg',
  Hunter:BASE+'ability_hunter_beasttaming.jpg',Rogue:BASE+'ability_backstab.jpg',
  Priest:BASE+'spell_holy_guardianspirit.jpg',Shaman:BASE+'spell_nature_lightning.jpg',
  Mage:BASE+'spell_frost_frostbolt02.jpg',Warlock:BASE+'spell_shadow_rainoffire.jpg',
  Druid:BASE+'spell_nature_starfall.jpg',
};

function specIcon(cls, spec) {
  if (spec && SPEC_ICONS[cls+':'+spec]) return SPEC_ICONS[cls+':'+spec];
  return CLASS_ICONS[cls] || BASE+'inv_misc_questionmark.jpg';
}

function gold() { return '#c8a84b'; }

// ── Load data from Supabase ───────────────────────────────
async function loadData() {
  try {
    // Load members
    const { data: memberRows, error: mErr } = await _sb.from('members').select('id,data').order('id');
    if (mErr) throw mErr;
    const members = (memberRows || []).map(r => r.data);

    // Load ideal
    const { data: idealRow, error: iErr } = await _sb.from('guild_data').select('data').eq('key','ideal').single();
    if (iErr && iErr.code !== 'PGRST116') throw iErr;
    const ideal = (idealRow && idealRow.data) ? idealRow.data : {};

    return { members, ideal };
  } catch(e) {
    console.warn('Load error:', e);
    return null;
  }
}

// ── Render ────────────────────────────────────────────────
function render(members, ideal) {
  const classData = CLASSES.map(c => {
    const specs = CLASS_SPECS[c.name];
    const have = members.filter(m => m.cls === c.name).length;
    const want = specs.reduce((sum, spec) => sum + (ideal[c.name+':'+spec] || 0), 0);
    const diff = want - have;
    return { c, have, want, diff, specs };
  }).filter(d => d.want > 0); // Only show classes with targets set

  const totalHave = classData.reduce((s,d) => s+d.have, 0);
  const totalWant = classData.reduce((s,d) => s+d.want, 0);
  const totalNeed = classData.filter(d=>d.diff>0).reduce((s,d)=>s+d.diff,0);
  const classesFull = classData.filter(d=>d.want>0&&d.diff===0).length;
  const overallPct = totalWant > 0 ? Math.min(100, Math.round(totalHave/totalWant*100)) : 100;

  // Spec chips — only "need" ones for the public view
  const needCards = classData.flatMap(({c, specs}) =>
    specs.flatMap(spec => {
      const key = c.name+':'+spec;
      const haveSpec = members.filter(m => m.cls===c.name && m.spec===spec).length;
      const wantSpec = ideal[key] || 0;
      const diffSpec = wantSpec - haveSpec;
      if (diffSpec <= 0 || wantSpec === 0) return [];
      const icon = specIcon(c.name, spec);
      return [`<div style="display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid rgba(200,60,60,0.25);border-radius:var(--radius);padding:6px 10px">
        <img src="${icon}" style="width:22px;height:22px;border-radius:4px;flex-shrink:0" onerror="this.style.display='none'">
        <div style="display:flex;flex-direction:column;gap:1px">
          <span style="font-size:11px;font-weight:700;color:${c.color};line-height:1">${c.name}</span>
          <span style="font-size:10px;color:var(--text2);line-height:1">${spec}</span>
        </div>
        <span style="font-size:13px;font-weight:700;color:#f08080;margin-left:4px">-${diffSpec}</span>
      </div>`];
    })
  ).join('');

  document.getElementById('recruit-summary').innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px 20px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;margin-bottom:14px">
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px">Roster fill</div>
          <div style="font-size:26px;font-weight:700;font-family:'Cinzel',serif;color:${overallPct===100?'#80d080':overallPct>70?gold():'#f08080'}">${overallPct}%</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px">Spots needed</div>
          <div style="font-size:26px;font-weight:700;font-family:'Cinzel',serif;color:${totalNeed>0?'#f08080':'#80d080'}">${totalNeed}</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px">Current / Target</div>
          <div style="font-size:26px;font-weight:700;font-family:'Cinzel',serif;color:var(--gold2)">${totalHave}<span style="font-size:16px;color:var(--text3)"> / ${totalWant}</span></div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px">Classes full</div>
          <div style="font-size:26px;font-weight:700;font-family:'Cinzel',serif;color:#80d080">${classesFull}<span style="font-size:13px;color:var(--text3)"> / ${classData.length}</span></div>
        </div>
      </div>
      <div style="height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-bottom:${needCards?'14px':'0'}">
        <div style="height:100%;width:${overallPct}%;background:${overallPct===100?'#60c060':overallPct>70?'#c8a84b':'#e06060'};border-radius:4px;transition:width .4s"></div>
      </div>
      ${needCards ? `<div><div style="font-size:11px;color:#f08080;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Currently Recruiting</div><div style="display:flex;flex-wrap:wrap;gap:6px">${needCards}</div></div>` : '<div style="color:#80d080;font-size:13px">✓ All spots currently filled</div>'}
    </div>
  `;

  document.getElementById('recruit-list').innerHTML = classData.map(({c, have, want, diff, specs}) => {
    const pct = want > 0 ? Math.min(100, Math.round(have/want*100)) : 100;
    const barColor = diff > 0 ? '#e06060' : diff === 0 ? '#60c060' : gold();
    const badge = diff > 0
      ? `<span class="need-badge need-more">Need ${diff}</span>`
      : diff === 0
        ? `<span class="need-badge need-ok">Full</span>`
        : `<span class="need-badge need-over">${Math.abs(diff)} over</span>`;

    const specRows = specs.map(spec => {
      const key = c.name+':'+spec;
      const haveSpec = members.filter(m => m.cls===c.name && m.spec===spec).length;
      const wantSpec = ideal[key] || 0;
      if (wantSpec === 0) return '';
      const diffSpec = wantSpec - haveSpec;
      const sicon = specIcon(c.name, spec);
      const specBadge = diffSpec > 0
        ? `<span style="font-size:11px;font-weight:600;color:#f08080">Need ${diffSpec}</span>`
        : diffSpec === 0
          ? `<span style="font-size:11px;font-weight:600;color:#80d080">Full</span>`
          : `<span style="font-size:11px;font-weight:600;color:${gold()}">${Math.abs(diffSpec)} over</span>`;
      return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0 4px 16px;border-top:1px solid var(--border)">
        <img src="${sicon}" style="width:18px;height:18px;border-radius:3px;flex-shrink:0" onerror="this.style.display='none'">
        <span style="flex:1;font-size:12px;color:var(--text2)">${spec}</span>
        <span style="font-size:12px;color:var(--text2);min-width:40px;text-align:center">${haveSpec} / ${wantSpec}</span>
        ${specBadge}
      </div>`;
    }).join('');

    return `<div class="recruit-row">
      <div style="display:grid;grid-template-columns:130px 1fr auto auto;align-items:center;gap:16px;padding:10px 16px">
        <span style="font-size:13px;font-weight:700;color:${c.color}">${c.name}</span>
        <div><div class="recruit-bar-wrap"><div class="recruit-bar" style="width:${pct}%;background:${barColor}"></div></div></div>
        <span class="recruit-nums">${have} / ${want}</span>
        ${badge}
      </div>
      ${specRows ? `<div style="padding:0 16px 8px">${specRows}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Init ──────────────────────────────────────────────────
(async function() {
  const data = await loadData();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('recruit-summary').style.display = 'block';

  if (!data) {
    document.getElementById('recruit-summary').innerHTML = `
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:24px;text-align:center;color:var(--text3)">
        Could not load recruitment data. Please try again later.
      </div>`;
    document.getElementById('sync-status').textContent = '⚠ Offline';
    document.getElementById('sync-status').style.color = '#e06060';
    return;
  }

  render(data.members, data.ideal);
  document.getElementById('sync-status').textContent = '✓ Live';
  document.getElementById('sync-status').style.color = '#80d080';
})();
</script>
</body>
</html>
